<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Host Requests | TSP Admin</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --color-deep-teal: #236383;
      --color-golden: #FBAD3F;
      --color-teal: #007E8C;
      --color-light-teal: #47B3CB;
      --color-burgundy: #A31C41;
      --color-cream: #F8F6F4;
      --color-white: #FFFFFF;
      --color-charcoal: #2C2C2C;
      --color-gray: #6B6B6B;
      --color-light-gray: #E5E5E5;
      --font-display: 'Fraunces', serif;
      --font-body: 'DM Sans', sans-serif;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: var(--color-cream);
      color: var(--color-charcoal);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--color-deep-teal);
      color: white;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
    }

    .header h1 {
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 500;
      opacity: 0.9;
    }

    .refresh-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
    }

    .refresh-btn:hover {
      background: rgba(255,255,255,0.25);
    }

    /* Main Layout */
    .main {
      display: grid;
      grid-template-columns: 400px 1fr;
      min-height: calc(100vh - 68px);
    }

    @media (max-width: 900px) {
      .main {
        grid-template-columns: 1fr;
      }
      .detail-panel {
        display: none;
      }
      .detail-panel.active {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 200;
      }
    }

    /* List Panel */
    .list-panel {
      background: var(--color-white);
      border-right: 1px solid var(--color-light-gray);
      overflow-y: auto;
    }

    .filter-bar {
      padding: 16px;
      border-bottom: 1px solid var(--color-light-gray);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      background: var(--color-white);
      z-index: 10;
    }

    .filter-btn {
      padding: 8px 14px;
      border: 2px solid var(--color-light-gray);
      background: var(--color-white);
      border-radius: 20px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      border-color: var(--color-teal);
    }

    .filter-btn.active {
      background: var(--color-teal);
      border-color: var(--color-teal);
      color: white;
    }

    .filter-btn .count {
      display: inline-block;
      background: rgba(0,0,0,0.1);
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 6px;
      font-size: 0.8rem;
    }

    .filter-btn.active .count {
      background: rgba(255,255,255,0.25);
    }

    /* Request Cards */
    .request-list {
      padding: 8px;
    }

    .request-card {
      padding: 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s;
      border: 2px solid transparent;
      margin-bottom: 4px;
    }

    .request-card:hover {
      background: var(--color-cream);
    }

    .request-card.selected {
      background: rgba(0, 126, 140, 0.08);
      border-color: var(--color-teal);
    }

    .request-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .request-name {
      font-weight: 600;
      font-size: 1rem;
    }

    .request-org {
      color: var(--color-gray);
      font-size: 0.85rem;
    }

    .status-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .status-new {
      background: rgba(251, 173, 63, 0.2);
      color: #B8860B;
    }

    .status-confirmed {
      background: rgba(0, 126, 140, 0.15);
      color: var(--color-teal);
    }

    .status-completed {
      background: rgba(107, 107, 107, 0.15);
      color: var(--color-gray);
    }

    .request-meta {
      display: flex;
      gap: 16px;
      font-size: 0.85rem;
      color: var(--color-gray);
    }

    .request-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Detail Panel */
    .detail-panel {
      background: var(--color-cream);
      overflow-y: auto;
      padding: 32px;
    }

    .detail-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--color-gray);
      text-align: center;
      padding: 40px;
    }

    .detail-empty svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .detail-card {
      background: var(--color-white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      max-width: 700px;
    }

    .detail-header {
      padding: 24px;
      border-bottom: 1px solid var(--color-light-gray);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .detail-header h2 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      margin-bottom: 4px;
    }

    .detail-header .org {
      color: var(--color-gray);
    }

    .mobile-close {
      display: none;
      background: var(--color-light-gray);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.25rem;
    }

    @media (max-width: 900px) {
      .mobile-close {
        display: flex;
        align-items: center;
        justify-content: center;
      }
    }

    .detail-body {
      padding: 24px;
    }

    .detail-section {
      margin-bottom: 28px;
    }

    .detail-section:last-child {
      margin-bottom: 0;
    }

    .detail-section h3 {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-gray);
      margin-bottom: 12px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 500px) {
      .info-grid {
        grid-template-columns: 1fr;
      }
    }

    .info-item label {
      display: block;
      font-size: 0.8rem;
      color: var(--color-gray);
      margin-bottom: 4px;
    }

    .info-item p {
      font-weight: 500;
    }

    .info-item a {
      color: var(--color-teal);
      text-decoration: none;
    }

    .info-item a:hover {
      text-decoration: underline;
    }

    .info-item.full-width {
      grid-column: 1 / -1;
    }

    /* Call Time Options */
    .call-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .call-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--color-cream);
      border: 2px solid var(--color-light-gray);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
    }

    .call-option:hover {
      border-color: var(--color-teal);
    }

    .call-option.selected {
      background: rgba(0, 126, 140, 0.1);
      border-color: var(--color-teal);
    }

    .call-option input {
      display: none;
    }

    .call-option .radio {
      width: 20px;
      height: 20px;
      border: 2px solid var(--color-light-gray);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .call-option.selected .radio {
      border-color: var(--color-teal);
      background: var(--color-teal);
    }

    .call-option.selected .radio::after {
      content: '';
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
    }

    .call-option-text {
      font-weight: 500;
    }

    .call-option-text .day {
      color: var(--color-gray);
      font-weight: 400;
      margin-left: 8px;
    }

    /* Action Buttons */
    .detail-actions {
      padding: 20px 24px;
      border-top: 1px solid var(--color-light-gray);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 2px solid transparent;
    }

    .btn-primary {
      background: var(--color-golden);
      color: var(--color-charcoal);
    }

    .btn-primary:hover {
      background: #E89D2E;
    }

    .btn-primary:disabled {
      background: var(--color-light-gray);
      color: var(--color-gray);
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--color-white);
      border-color: var(--color-light-gray);
      color: var(--color-charcoal);
    }

    .btn-secondary:hover {
      border-color: var(--color-teal);
      color: var(--color-teal);
    }

    .btn-danger {
      background: var(--color-white);
      border-color: var(--color-burgundy);
      color: var(--color-burgundy);
    }

    .btn-danger:hover {
      background: var(--color-burgundy);
      color: white;
    }

    /* Loading State */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      color: var(--color-gray);
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--color-light-gray);
      border-top-color: var(--color-teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-gray);
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--color-charcoal);
      color: white;
      padding: 16px 24px;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success {
      background: var(--color-teal);
    }

    .toast.error {
      background: var(--color-burgundy);
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <span class="logo">🥪 TSP</span>
      <h1>Host Requests</h1>
    </div>
    <button class="refresh-btn" onclick="loadRequests()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 12a9 9 0 11-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
      </svg>
      Refresh
    </button>
  </header>

  <main class="main">
    <!-- List Panel -->
    <div class="list-panel">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All <span class="count" id="count-all">0</span></button>
        <button class="filter-btn" data-filter="new">New <span class="count" id="count-new">0</span></button>
        <button class="filter-btn" data-filter="confirmed">Confirmed <span class="count" id="count-confirmed">0</span></button>
        <button class="filter-btn" data-filter="completed">Completed <span class="count" id="count-completed">0</span></button>
      </div>
      <div class="request-list" id="requestList">
        <div class="loading">
          <div class="spinner"></div>
          Loading requests...
        </div>
      </div>
    </div>

    <!-- Detail Panel -->
    <div class="detail-panel" id="detailPanel">
      <div class="detail-empty" id="detailEmpty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <p>Select a request to view details</p>
      </div>
      <div class="detail-card" id="detailCard" style="display: none;"></div>
    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Firebase SDK -->
  <script type="module">
    const firebaseConfig = {
      apiKey: "AIzaSyAT4XsQUE4ljDO11lDL8iygf1IayRnzeY8",
      authDomain: "tsp-group-event-guide.firebaseapp.com",
      projectId: "tsp-group-event-guide",
      storageBucket: "tsp-group-event-guide.firebasestorage.app",
      messagingSenderId: "934097743660",
      appId: "1:934097743660:web:2d751d1596b44c82b4c689",
      measurementId: "G-30QL51VD1H"
    };

    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, getDocs, doc, updateDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // State
    let requests = [];
    let selectedId = null;
    let currentFilter = 'all';

    // Make functions available globally
    window.loadRequests = loadRequests;
    window.selectRequest = selectRequest;
    window.selectCallOption = selectCallOption;
    window.sendConfirmation = sendConfirmation;
    window.markCompleted = markCompleted;
    window.closeDetail = closeDetail;

    // Load requests from Firebase
    async function loadRequests() {
      const listEl = document.getElementById('requestList');
      listEl.innerHTML = '<div class="loading"><div class="spinner"></div>Loading requests...</div>';

      try {
        const q = query(collection(db, 'groupRequests'), orderBy('submittedAt', 'desc'));
        const snapshot = await getDocs(q);
        
        requests = [];
        snapshot.forEach(doc => {
          requests.push({ id: doc.id, ...doc.data() });
        });

        updateCounts();
        renderList();

        // Re-select if we had one selected
        if (selectedId) {
          const stillExists = requests.find(r => r.id === selectedId);
          if (stillExists) {
            renderDetail(stillExists);
          } else {
            selectedId = null;
            document.getElementById('detailCard').style.display = 'none';
            document.getElementById('detailEmpty').style.display = 'flex';
          }
        }
      } catch (error) {
        console.error('Error loading requests:', error);
        listEl.innerHTML = '<div class="empty-state">Error loading requests. Check console.</div>';
      }
    }

    // Update filter counts
    function updateCounts() {
      document.getElementById('count-all').textContent = requests.length;
      document.getElementById('count-new').textContent = requests.filter(r => r.status === 'new').length;
      document.getElementById('count-confirmed').textContent = requests.filter(r => r.status === 'confirmed').length;
      document.getElementById('count-completed').textContent = requests.filter(r => r.status === 'completed').length;
    }

    // Render list
    function renderList() {
      const listEl = document.getElementById('requestList');
      const filtered = currentFilter === 'all' 
        ? requests 
        : requests.filter(r => r.status === currentFilter);

      if (filtered.length === 0) {
        listEl.innerHTML = '<div class="empty-state">No requests found</div>';
        return;
      }

      listEl.innerHTML = filtered.map(r => `
        <div class="request-card ${r.id === selectedId ? 'selected' : ''}" onclick="selectRequest('${r.id}')">
          <div class="request-card-header">
            <div>
              <div class="request-name">${escapeHtml(r.name)}</div>
              ${r.organization ? `<div class="request-org">${escapeHtml(r.organization)}</div>` : ''}
            </div>
            <span class="status-badge status-${r.status}">${r.status}</span>
          </div>
          <div class="request-meta">
            <span>🥪 ${r.sandwichCount}</span>
            <span>📅 ${r.eventDate}</span>
            <span>📍 ${escapeHtml(r.location?.split(',')[0] || 'TBD')}</span>
          </div>
        </div>
      `).join('');
    }

    // Select a request
    function selectRequest(id) {
      selectedId = id;
      const request = requests.find(r => r.id === id);
      renderList();
      renderDetail(request);
      
      // On mobile, show detail panel
      document.getElementById('detailPanel').classList.add('active');
    }

    // Close detail on mobile
    function closeDetail() {
      document.getElementById('detailPanel').classList.remove('active');
    }

    // Render detail
    function renderDetail(r) {
      document.getElementById('detailEmpty').style.display = 'none';
      const card = document.getElementById('detailCard');
      card.style.display = 'block';

      const formatDate = (dateStr) => {
        if (!dateStr) return 'N/A';
        const date = new Date(dateStr + 'T12:00:00');
        return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      };

      const callOptionsHtml = r.callOptions?.length ? r.callOptions.map((opt, i) => `
        <div class="call-option ${r.selectedCallOption === i ? 'selected' : ''}" onclick="selectCallOption('${r.id}', ${i})">
          <span class="radio"></span>
          <span class="call-option-text">
            ${formatDate(opt.date)} at ${opt.time}
            <span class="day">${new Date(opt.date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long' })}</span>
          </span>
        </div>
      `).join('') : '<p style="color: var(--color-gray);">No call times provided</p>';

      card.innerHTML = `
        <div class="detail-header">
          <div>
            <h2>${escapeHtml(r.name)}</h2>
            ${r.organization ? `<p class="org">${escapeHtml(r.organization)}</p>` : ''}
          </div>
          <button class="mobile-close" onclick="closeDetail()">×</button>
        </div>
        <div class="detail-body">
          <div class="detail-section">
            <h3>Contact Info</h3>
            <div class="info-grid">
              <div class="info-item">
                <label>Email</label>
                <p><a href="mailto:${escapeHtml(r.email)}">${escapeHtml(r.email)}</a></p>
              </div>
              <div class="info-item">
                <label>Phone</label>
                <p><a href="tel:${escapeHtml(r.phone)}">${escapeHtml(r.phone)}</a></p>
              </div>
            </div>
          </div>

          <div class="detail-section">
            <h3>Event Details</h3>
            <div class="info-grid">
              <div class="info-item">
                <label>Preferred Date</label>
                <p>${escapeHtml(r.eventDate)}</p>
              </div>
              <div class="info-item">
                <label>Sandwich Count</label>
                <p>${escapeHtml(r.sandwichCount)}</p>
              </div>
              <div class="info-item">
                <label>Sandwich Type</label>
                <p>${r.sandwichTypes?.join(', ') || 'Not specified'}</p>
              </div>
              <div class="info-item">
                <label>Location</label>
                <p>${escapeHtml(r.location || 'Not provided')}</p>
              </div>
              ${r.sandwichNotes ? `
                <div class="info-item full-width">
                  <label>Sandwich Notes</label>
                  <p>${escapeHtml(r.sandwichNotes)}</p>
                </div>
              ` : ''}
            </div>
          </div>

          <div class="detail-section">
            <h3>Select Call Time</h3>
            <div class="call-options" id="callOptions-${r.id}">
              ${callOptionsHtml}
            </div>
          </div>

          ${r.notes ? `
            <div class="detail-section">
              <h3>Additional Notes</h3>
              <p>${escapeHtml(r.notes)}</p>
            </div>
          ` : ''}

          ${r.confirmedCallTime ? `
            <div class="detail-section">
              <h3>Confirmed Call</h3>
              <p style="color: var(--color-teal); font-weight: 600;">
                ${formatDate(r.confirmedCallTime.date)} at ${r.confirmedCallTime.time}
              </p>
            </div>
          ` : ''}
        </div>
        <div class="detail-actions">
          ${r.status === 'new' ? `
            <button class="btn btn-primary" onclick="sendConfirmation('${r.id}')" id="confirmBtn-${r.id}" ${r.selectedCallOption === undefined ? 'disabled' : ''}>
              ✉️ Send Confirmation
            </button>
          ` : ''}
          ${r.status === 'confirmed' ? `
            <button class="btn btn-primary" onclick="markCompleted('${r.id}')">
              ✓ Mark Completed
            </button>
          ` : ''}
          <button class="btn btn-secondary" onclick="window.open('mailto:${escapeHtml(r.email)}', '_blank')">
            📧 Email
          </button>
          <button class="btn btn-secondary" onclick="window.open('tel:${escapeHtml(r.phone)}', '_blank')">
            📞 Call
          </button>
        </div>
      `;
    }

    // Select call option
    async function selectCallOption(id, index) {
      const request = requests.find(r => r.id === id);
      if (!request) return;

      request.selectedCallOption = index;

      // Update UI
      const options = document.querySelectorAll(`#callOptions-${id} .call-option`);
      options.forEach((opt, i) => {
        opt.classList.toggle('selected', i === index);
      });

      // Enable confirm button
      const confirmBtn = document.getElementById(`confirmBtn-${id}`);
      if (confirmBtn) confirmBtn.disabled = false;
    }

    // Send confirmation email
    async function sendConfirmation(id) {
      const request = requests.find(r => r.id === id);
      if (!request || request.selectedCallOption === undefined) return;

      const selectedTime = request.callOptions[request.selectedCallOption];
      const formattedDate = new Date(selectedTime.date + 'T12:00:00').toLocaleDateString('en-US', { 
        weekday: 'long', 
        month: 'long', 
        day: 'numeric' 
      });

      // Update Firebase
      try {
        await updateDoc(doc(db, 'groupRequests', id), {
          status: 'confirmed',
          confirmedCallTime: selectedTime,
          confirmedAt: new Date().toISOString()
        });

        // Update local state
        request.status = 'confirmed';
        request.confirmedCallTime = selectedTime;

        // Open email client with pre-filled content
        const subject = encodeURIComponent(`TSP Event Planning Call - ${formattedDate}`);
        const body = encodeURIComponent(
`Hi ${request.name},

Thanks for your interest in hosting a Sandwich Project event!

We'd love to connect with you on ${formattedDate} at ${selectedTime.time} to discuss the details.

Please let us know if this time still works for you. If not, just reply with a couple alternatives and we'll find something that works.

Looking forward to chatting!

– The Sandwich Project Team`
        );

        window.open(`mailto:${request.email}?subject=${subject}&body=${body}`, '_blank');

        showToast('Confirmation saved! Email draft opened.', 'success');
        updateCounts();
        renderList();
        renderDetail(request);

      } catch (error) {
        console.error('Error updating request:', error);
        showToast('Error saving confirmation', 'error');
      }
    }

    // Mark as completed
    async function markCompleted(id) {
      const request = requests.find(r => r.id === id);
      if (!request) return;

      try {
        await updateDoc(doc(db, 'groupRequests', id), {
          status: 'completed',
          completedAt: new Date().toISOString()
        });

        request.status = 'completed';
        showToast('Marked as completed!', 'success');
        updateCounts();
        renderList();
        renderDetail(request);

      } catch (error) {
        console.error('Error updating request:', error);
        showToast('Error updating status', 'error');
      }
    }

    // Toast notification
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // Escape HTML
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderList();
      });
    });

    // Initial load
    loadRequests();
  </script>
</body>
</html>
